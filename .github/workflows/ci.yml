name: CI
on:
  push: { branches: [ main ] }
  pull_request: { branches: [ main ] }
jobs:
  server:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env: { POSTGRES_DB: test_db, POSTGRES_USER: postgres, POSTGRES_PASSWORD: postgres }
        ports: [ "5432:5432" ]
        options: --health-cmd pg_isready --health-interval 10s --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports: [ "6379:6379" ]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        # version resolved from packageManager field in server/package.json (pnpm@10.33.0)
      - uses: actions/setup-node@v4
        with: { node-version: 20, cache: pnpm }
      - run: cd server && pnpm install --frozen-lockfile
      - run: cd server && pnpm typecheck
      # lint step disabled for v0.1.0 — ESLint 9 flat-config migration pending.
      # typecheck above covers static analysis for the launch.
      - run: cd server && pnpm test:coverage
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/test_db
          REDIS_URL: redis://localhost:6379
          JWT_SECRET: test-secret-minimum-32-characters-long-for-hs256
          NODE_ENV: test
